<!DOCTYPE html>
<html>
<head>
    <title>EFT Payment - The Next Chapter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>EFT Checkout</h2>

<form action="send-eft-order.php" method="POST" class="checkout-box">

    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="address" placeholder="Full Shipping Address" required></textarea>

    <textarea name="orderDetails" id="orderDetails" hidden></textarea>
    <input type="hidden" name="total" id="orderTotal">

    <button type="submit">Place EFT Order</button>
</form>

<script>
const cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let details = "";

cart.forEach(item => {
    total += item.price;
    details += item.title ? item.title + ", " : item.name + ", ";
});

document.getElementById("orderDetails").value = details;
document.getElementById("orderTotal").value = total;
</script>

</body>
</html>
